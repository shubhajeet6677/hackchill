<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONIC.AI | Music Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0d1a;
            --accent-color: #00e87b;
            --accent-gradient: linear-gradient(90deg, #00e87b 0%, #00c896 100%);
            --card-bg: rgba(255, 255, 255, 0.04);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --sidebar-width: 260px;
            --nav-height: 64px;
            --chord-root: #00e87b;
            --chord-dominant: #00d2ff;
            --chord-relative: #a855f7;
            --chord-subdominant: #fbbf24;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Top Navigation --- */
        nav {
            height: var(--nav-height);
            border-bottom: 0.5px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .nav-left { display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 24px; height: 24px; fill: var(--accent-color); }
        .logo-text { font-weight: 900; font-size: 1.1rem; letter-spacing: -0.5px; }
        .logo-text span { color: var(--text-muted); font-weight: 400; margin-left: 4px; }

        .nav-center {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 100px;
            gap: 4px;
        }
        .nav-tab {
            padding: 6px 20px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-tab.active { background: var(--card-bg); color: var(--text-color); }
        .nav-tab:hover:not(.active) { color: var(--text-color); }

        .nav-right { display: flex; align-items: center; }
        .user-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--accent-gradient);
            border: 2px solid var(--border-color);
        }

        /* --- Main Layout --- */
        .app-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        aside {
            width: var(--sidebar-width);
            border-right: 0.5px solid var(--border-color);
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .sidebar-section { display: flex; flex-direction: column; gap: 16px; }
        .section-label {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Sliders */
        .slider-group { display: flex; flex-direction: column; gap: 12px; }
        .slider-header { display: flex; justify-content: space-between; align-items: center; }
        .slider-header label { font-size: 0.85rem; font-weight: 500; }
        .slider-value { font-size: 0.85rem; font-weight: 700; color: var(--accent-color); }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-color);
            border: 2px solid var(--bg-color);
        }

        /* Chip Grids */
        .chip-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .chip {
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 0.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chip.active {
            background: rgba(0, 232, 123, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* --- Main Content --- */
        main {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 0.5px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card-label {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-label span { color: var(--accent-color); }

        /* Prompt Card */
        textarea {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.2);
            border: 0.5px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
        }
        textarea::placeholder { color: var(--text-muted); }
        textarea:focus { border-color: var(--accent-color); }

        .cta-button {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            color: var(--bg-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s;
        }
        .cta-button:hover { transform: translateY(-2px); }
        .cta-button:active { transform: translateY(0); }
        .cta-button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Insights Card */
        .insights-header { display: flex; justify-content: space-between; align-items: center; }
        .insights-title { font-weight: 700; font-size: 1.1rem; }
        .badge-pill {
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            border: 0.5px solid var(--border-color);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .stat-label { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); }
        .stat-value { font-size: 1.2rem; font-weight: 800; }

        .chord-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chord-chip {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--bg-color);
        }
        .arrow { color: var(--text-muted); font-size: 0.8rem; }

        /* Waveform */
        .waveform {
            height: 60px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
        }
        .wave-bar {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            min-height: 4px;
        }
        .wave-bar.active { background: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); }

        /* --- Loading Overlay --- */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 13, 26, 0.8);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(4px);
        }
        .loader {
            width: 48px; height: 48px;
            border: 4px solid var(--accent-color);
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- Responsive --- */
        @media (max-width: 900px) {
            aside { display: none; }
            .nav-center { display: none; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader"></div>
    </div>

    <nav>
        <div class="nav-left">
            <svg class="logo-icon" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            <div class="logo-text">SONIC.AI<span>/ Music Studio</span></div>
        </div>
        <div class="nav-center">
            <div class="nav-tab active">Compose</div>
            <div class="nav-tab">Library</div>
            <div class="nav-tab">Mixer</div>
            <div class="nav-tab">Export</div>
        </div>
        <div class="nav-right">
            <div class="user-avatar"></div>
        </div>
    </nav>

    <div class="app-container">
        <aside>
            <div class="sidebar-section">
                <div class="section-label">Tempo & Timing</div>
                <div class="slider-group">
                    <div class="slider-header">
                        <label>BPM</label>
                        <span class="slider-value" id="bpmVal">120</span>
                    </div>
                    <input type="range" id="bpmSlider" min="60" max="200" value="120" step="5">
                </div>
                <div class="slider-group">
                    <div class="slider-header">
                        <label>Bars</label>
                        <span class="slider-value" id="barsVal">8</span>
                    </div>
                    <input type="range" id="barsSlider" min="4" max="32" value="8" step="4">
                </div>
                <div class="slider-group">
                    <div class="slider-header">
                        <label>Beats/Bar</label>
                        <span class="slider-value" id="beatsVal">4</span>
                    </div>
                    <input type="range" id="beatsSlider" min="2" max="7" value="4" step="1">
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-label">Genre</div>
                <div class="chip-grid" id="genreGrid">
                    <div class="chip active" data-value="pop">Pop</div>
                    <div class="chip" data-value="jazz">Jazz</div>
                    <div class="chip" data-value="classical">Classical</div>
                    <div class="chip" data-value="ambient">Ambient</div>
                    <div class="chip" data-value="hiphop">Hip-Hop</div>
                    <div class="chip" data-value="electronic">Electronic</div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-label">Instrument</div>
                <div class="chip-grid" id="instrumentGrid">
                    <div class="chip active" data-value="piano">Piano</div>
                    <div class="chip" data-value="guitar">Guitar</div>
                    <div class="chip" data-value="synth">Synth</div>
                    <div class="chip" data-value="strings">Strings</div>
                </div>
            </div>
        </aside>

        <main>
            <div class="card">
                <div class="card-label"><span>✦</span> Composition Prompt</div>
                <textarea id="promptInput" placeholder="Describe the energy, mood, and instruments of your piece..."></textarea>
                <button class="cta-button" id="composeBtn">✦ Compose Masterpiece</button>
            </div>

            <div class="card" id="insightsCard">
                <div class="insights-header">
                    <div class="insights-title">Composition Insights</div>
                    <div class="badge-pill" id="insightBadge">READY</div>
                </div>

                <div class="metrics-grid">
                    <div class="stat-card">
                        <div class="stat-label">Melody notes</div>
                        <div class="stat-value" id="melodyMetric">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Harmony notes</div>
                        <div class="stat-value" id="harmonyMetric">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Drum events</div>
                        <div class="stat-value" id="drumMetric">0</div>
                    </div>
                </div>

                <div class="chord-row" id="chordRow">
                    <!-- Chords will appear here -->
                </div>

                <div class="waveform" id="waveform">
                    <!-- Bars will appear here -->
                </div>

                <div id="downloadArea" style="display: none; margin-top: 10px;">
                    <a id="downloadBtn" href="#" class="download-btn">📥 Download MIDI File</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- State Management ---
        let state = {
            bpm: 120,
            bars: 8,
            beats: 4,
            genre: 'pop',
            instrument: 'piano'
        };

        // --- UI Interactions ---
        const bpmSlider = document.getElementById('bpmSlider');
        const bpmVal = document.getElementById('bpmVal');
        bpmSlider.oninput = () => { state.bpm = bpmSlider.value; bpmVal.innerText = state.bpm; };

        const barsSlider = document.getElementById('barsSlider');
        const barsVal = document.getElementById('barsVal');
        barsSlider.oninput = () => { state.bars = barsSlider.value; barsVal.innerText = state.bars; };

        const beatsSlider = document.getElementById('beatsSlider');
        const beatsVal = document.getElementById('beatsVal');
        beatsSlider.oninput = () => { state.beats = beatsSlider.value; beatsVal.innerText = state.beats; };

        function setupChipGrid(gridId, stateKey) {
            const grid = document.getElementById(gridId);
            grid.addEventListener('click', (e) => {
                if (e.target.classList.contains('chip')) {
                    grid.querySelector('.chip.active').classList.remove('active');
                    e.target.classList.add('active');
                    state[stateKey] = e.target.dataset.value;
                }
            });
        }
        setupChipGrid('genreGrid', 'genre');
        setupChipGrid('instrumentGrid', 'instrument');

        // --- Waveform Generation ---
        const waveform = document.getElementById('waveform');
        for (let i = 0; i < 40; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar';
            bar.style.height = (Math.random() * 80 + 20) + '%';
            waveform.appendChild(bar);
        }

        function animateWaveform() {
            const bars = waveform.querySelectorAll('.wave-bar');
            bars.forEach(bar => {
                if (Math.random() > 0.7) {
                    bar.classList.toggle('active');
                    bar.style.height = (Math.random() * 80 + 20) + '%';
                }
            });
        }
        setInterval(animateWaveform, 150);

        // --- Composition Flow ---
        const composeBtn = document.getElementById('composeBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');

        composeBtn.addEventListener('click', async () => {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return alert('Please enter a prompt');

            loadingOverlay.style.display = 'flex';
            composeBtn.disabled = true;

            try {
                const response = await fetch('/compose', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        genre: state.genre,
                        instrument: state.instrument,
                        tempo: state.bpm,
                        bars: state.bars,
                        time_num: state.beats,
                        time_den: 4
                    })
                });

                const result = await response.json();

                if (result.success) {
                    updateInsights(result);
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (err) {
                alert('Connection error');
            } finally {
                loadingOverlay.style.display = 'none';
                composeBtn.disabled = false;
            }
        });

        function updateInsights(data) {
            document.getElementById('insightBadge').innerText = `${data.genre.toUpperCase()} | ${data.bpm} BPM`;
            
            // Mocking some metrics based on result summary parsing or defaults
            // In a real app, we'd return these from the API
            document.getElementById('melodyMetric').innerText = Math.floor(Math.random() * 100 + 50);
            document.getElementById('harmonyMetric').innerText = Math.floor(Math.random() * 200 + 100);
            document.getElementById('drumMetric').innerText = Math.floor(Math.random() * 300 + 200);

            // Chord Progression chips
            const chordRow = document.getElementById('chordRow');
            chordRow.innerHTML = '';
            const mockChords = ['Am7', 'Dm9', 'G13', 'Cmaj7', 'Fmaj7', 'Bm7b5', 'E7alt'];
            const colors = ['var(--chord-root)', 'var(--chord-dominant)', 'var(--chord-relative)', 'var(--chord-subdominant)'];
            
            mockChords.forEach((chord, i) => {
                const chip = document.createElement('div');
                chip.className = 'chord-chip';
                chip.style.backgroundColor = colors[i % colors.length];
                chip.innerText = chord;
                chordRow.appendChild(chip);
                if (i < mockChords.length - 1) {
                    const arrow = document.createElement('div');
                    arrow.className = 'arrow';
                    arrow.innerText = '→';
                    chordRow.appendChild(arrow);
                }
            });

            // Download Link
            const downloadArea = document.getElementById('downloadArea');
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.href = `/download/${data.filename}`;
            downloadArea.style.display = 'block';
        }
    </script>
</body>
</html>
